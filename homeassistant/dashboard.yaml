views:
  - title: Energie
    path: energie
    icon: mdi:solar-power
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-template-card
            primary: Autarkiegrad
            secondary: '{{ states(''sensor.autarkiegrad_heute'') }} %'
            icon: mdi:home-lightning-bolt
          - type: custom:mushroom-template-card
            primary: Eigenverbrauch
            secondary: '{{ states(''sensor.eigenverbrauchsquote_heute'') }} %'
            icon: mdi:solar-power
          - type: custom:mushroom-template-card
            primary: PV → Haus
            secondary: '{{ states(''sensor.pv_direktverbrauch_heute'') }} kWh'
            icon: mdi:home
          - type: custom:mushroom-template-card
            primary: PV → Akku
            secondary: '{{ states(''sensor.sigen_plant_daily_battery_charge_energy'') }} kWh'
            icon: mdi:battery-arrow-up
          - type: custom:mushroom-template-card
            primary: PV → Netz
            secondary: '{{ states(''sensor.sigen_plant_daily_grid_export_energy'') }} kWh'
            icon: mdi:transmission-tower-export
          - type: custom:mushroom-template-card
            primary: Netz → Haus
            secondary: '{{ states(''sensor.sigen_plant_daily_grid_import_energy'') }} kWh'
            icon: mdi:transmission-tower-import
      - type: grid
        cards:
          - type: custom:power-flow-card-plus
            title: Energiefluss
            entities:
              solar:
                entity: sensor.sigen_plant_pv_power
              battery:
                entity: sensor.sigen_plant_battery_power
                state_of_charge: sensor.sigen_plant_battery_state_of_charge
                invert_state: true
              home:
                entity: sensor.sigen_plant_total_load_power
              grid:
                entity: sensor.sigen_plant_grid_active_power
            clickable_entities: true
            display_zero_lines: null
            mode: show
            watt_threshold: 0
      - type: grid
        cards:
          - type: tile
            entity: sensor.sigen_plant_daily_pv_energy
            name: ☀️ Erzeugt
          - type: tile
            entity: sensor.sigen_plant_daily_load_consumption
            name: 🏠 Verbraucht
          - type: tile
            entity: sensor.sigen_plant_daily_battery_charge_energy
            name: 🔋 Akku geladen
          - type: tile
            entity: sensor.sigen_plant_daily_battery_discharge_energy
            name: 🔋 Akku genutzt
          - type: tile
            entity: sensor.sigen_plant_daily_grid_export_energy
            name: ⚡ Einspeisung
          - type: tile
            entity: sensor.sigen_plant_daily_grid_import_energy
            name: 📥 Netzbezug
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: PV Leistung
            graph_span: 24h
            apex_config:
              chart:
                height: 250
            series:
              - entity: sensor.sigen_plant_pv_power
                name: PV
                type: area
      - type: grid
        cards:
          - type: tile
            entity: sensor.wp2_elektr_energie_heute
            name: WP Heute
          - type: tile
            entity: sensor.wp2_elektr_energie_monat
            name: WP Monat
          - type: tile
            entity: sensor.wp2_elektr_energie_jahr
            name: WP Jahr
          - type: tile
            entity: sensor.wp2_jahresarbeitszahl
            name: Jahres-AZ
          - type: tile
            entity: sensor.wp2_monatsarbeitszahl
            name: Monats-AZ
          - type: tile
            entity: sensor.wp2_gesamt_energie_jahr
            name: Wärme Jahr
    cards: []
